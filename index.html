<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Dice Roller</title>
  
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="scene">
    <div class="cube" id="dice">
      <div class="face front one"><div class="dot"></div></div>
      <div class="face back six">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="face right three">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="face left four">
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
      <div class="face top two">
        <div class="dot"></div><div class="dot"></div>
      </div>
      <div class="face bottom five">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <p id="result">Tap the dice to roll!</p>

  <script src="script.js?v=2"></script>
</body>
</html>
